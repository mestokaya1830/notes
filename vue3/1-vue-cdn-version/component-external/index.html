<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-top: 40px;
    }
    .wrapper{
      text-align: center;
    }
    .wrapper button{
      padding: 5px 15px;
      margin-top: 20px;
    }
    p{
      text-align: center;
      margin: 20px 0;
    }
  </style>
</head>

<body class="h-full grid place-items-center">
  <div id="app">
    <h2 class="title">{{ title }}</h2>
    <p>Prop mean is sending some data to the component from main page</p>
    <alert-component :message="title">Click Me</alert-component>
  </div>

  <script src="../vue3.js"></script>
  <!-- <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> -->
  <script type="module">
    import AlertComponent from './components/AlertComponent.js'
    Vue.createApp({
      components: {
        'alert-component':AlertComponent
      },
      data() {
        return {
          title: 'Local External Component  Prop'
        }
      },
      methods: {

      },
    })
      .mount('#app')
  </script>
</body>

</html>

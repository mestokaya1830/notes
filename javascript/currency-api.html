<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency With toLocalString</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        margin: 0 5px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: cornflowerblue;
      }
      h1 {
        margin: 30px 0;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 360px;
        height: 400px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background-color: #fff;
        padding: 20px;
      }
      .title {
        margin: 30px 0;
        font-size: 28px;
        font-weight: bold;
      }
      .amount {
        height: 46px;
        padding-left: 7px;
        border: 1px solid #666;
        border-radius: 5px;
        width: 100%;
        margin-top: 5px;
      }
      select {
        height: 46px;
        border: 1px solid #666;
        border-radius: 5px;
        width: 100%;
      }
      label {
        width: 100%;
      }
      .container-2 {
        display: flex;
        justify-content: space-between;
        width: 100%;
        margin-top: 20px;
      }
      .wrapper{
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 40%;
      }
      .wrapper-arrow{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
      }
      .result{
        height: 46px;
        line-height: 60px;
        width: 100%;
        font-weight: 500;
        padding-left: 5px;
      }
      button{
        width: 100%;
        padding: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: cornflowerblue;
        font-size: 18px;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Javascript Currency Api</h1>
    <div class="container">
      <div class="title">Currency Convertor</div>
      <label>Enter Amount</label>
      <input type="number" class="amount" id="amount" />
      <div class="container-2">
        <div class="wrapper">
          <span>From</span>
          <select id="from"></select>
        </div>
        <div class="wrapper-arrow">
          <span class="material-symbols-outlined">arrow_right_alt</span>
          <span class="material-symbols-outlined arrow-left">arrow_left_alt</span>
        </div>
        <div class="wrapper">
          <span>To</span>
          <select id="to"></select>
        </div>
      </div>
      <h3 id="result" class="result">0000</h3>
      <button id="rate">Get Exchange Rate</button>
    </div>
    <script></script>
  </body>
</html>

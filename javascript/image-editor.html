<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}
    body{
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: darkcyan;
    }
    h1{margin: 50px 0; color: #ddd;}
    .container{
      display: flex;
      flex-direction: column;
      width: 900px;
      height: 550px;
      border-radius: 5px;
      background-color: #f1f1f1;
      margin-top: 50px;
      padding: 30px;
    }
    .top{
      display: flex;
      height: 85%;
    }
    .left{
      width: 40%;
      height: 100%;
      margin-right: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 10px;
    }
    .right{
      width: 60%;
      height: 100%;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 10px;
    }
    footer{
      display: flex;
      justify-content: space-between;
      height: 20%;
      align-items: center;
    }
    .footer-btn{
      width: 140px;
      height: 42px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      &.reset{background-color: cadetblue; color: #fff;}
      &.image{background-color: chocolate; color: #fff;}
      &.save{background-color: darkcyan; color: #fff;}
    }
    h2{color: #444;}
    .con{
      display: flex;
      width: 100%;
      margin: 10px 0;
      gap: 5px;
      & button{
        flex: 1;
        height: 40px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        color: #444;
        cursor: pointer;
      }
      }
    .range-info{
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: 60px;
      font-size: 18px;
      color: #222;
      padding: 0 10px;
    }
    .brightness-text{
      width: 90%;
    }
    input[type="range"]{
      width: 100%;
    }
    .trans-btn{
      width: 25%;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin: 0 5px;
      height: 46px;
      line-height: 46px;
      text-align: center;
      cursor: pointer;
    }
    #rotateLeft, #flipLeft{
      transform: rotateY(180deg);
    }
  </style>
</head>
<body>
  <h1>Javascript Image Editor</h1>
  <div class="container">
    <div class="top">
      <div class="left">
        <h2>Filters</h2>
        <div class="con">
          <button>Brightness</button>
          <button>Saturation</button>
        </div>
        <div class="con">
          <button>Inversion</button>
          <button>Grayscale</button>
        </div>
        <div class="con range-info">
          <div class="brightness-text">Brightness</div><span>%</span>
        </div>
        <div class="con">
          <input type="range" name="" id="">
        </div>
        <div class="con range-info">
          <div class="brightness-text">Rotate & Flip</div>
        </div>
        <div class="con">
          <span class="material-symbols-outlined trans-btn" id="rotateRight">rotate_right</span>
          <span class="material-symbols-outlined trans-btn" id="rotateLeft">rotate_right</span>
          <span class="material-symbols-outlined trans-btn" id="flipRight">flip</span>
          <span class="material-symbols-outlined trans-btn" id="flipLeft">flip</span>
        </div>
      </div>
      <div class="right"></div>
    </div>
    <footer>
      <input type="button" class="footer-btn reset" value="Reset Filters">
      <div>
        <input type="button" class="footer-btn image" value="Select Image">
        <input type="button" class="footer-btn save" value="Save">
      </div>
    </footer>
  </div>
</body>
</html>

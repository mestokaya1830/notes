<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h3>Javascript Calculator</h3>
  <div id="container">
    <div id="output">0</div>
    <div id="btn-con">
      <button>AC</button>
      <button>DEL</button>
      <button>.</button>
      <button>/</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>*</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>-</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>+</button>
      <button>00</button>
      <button>0</button>
      <button data-equal id="equal">=</button>
    </div>
  </div>
  <script src="./app.js" defer></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queue</title>
  </head>
  <body>
    <h2 style="margin-top: 20px; text-align: center">Queue</h2>
    <h4 style="margin: 5px; text-align: center">Check Console (Press f12)</h4>

    <script>
      //queue rule is first-in first-out
      // program to implement queue data structure
      class Queue {
        constructor() {
          this.items = {};
          this.headIndex = 0;
          this.tailIndex = 0;
        }

        //adds a new element
        enqueue(element) {
          this.items[this.tailIndex] = element;
          this.tailIndex++;
        }

        //removes an element from head of the queue
        dequeue() {
          let removedElement = this.items[this.headIndex];
          delete this.items[this.headIndex];
          this.headIndex++;
          return removedElement;
        }

        //shows the head element of the  queue
        peek() {
          let peekElement = this.items[this.headIndex];
          return peekElement;
        }

        //shows the number of items in queue
        size() {
          return this.tailIndex - this.headIndex;
        }

        //checks if queue is empty or not
        isEmpty() {
          if (this.tailIndex - this.headIndex == 0) {
            return true;
          } else {
            return false;
          }
        }

        //empty the queue
        clear() {
          this.items = {};
          this.headIndex = 0;
          this.tailIndex = 0;
        }
      }
      let queue = new Queue();

      // add items to queue
      queue.enqueue(8);
      queue.enqueue(6);
      queue.enqueue(4);
      queue.enqueue(2);

      console.log("Queue after adding items: ");
      console.log(queue.items);

      // remove the first item
      queue.dequeue();

      console.log("Queue after deleting the first item:");
      console.log(queue.items);

      // show the first item
      console.log("First item of the queue = " + queue.peek());

      // empty the queue
      queue.clear();

      console.log("After clearing the queue: ");
      console.log(queue.items);
    </script>
  </body>
</html>

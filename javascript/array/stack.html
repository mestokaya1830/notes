<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack</title>
  </head>
  <body>
    <h2 style="margin-top:20px;text-align: center;">Stack</h2>
    <h4 style="margin:5px;text-align: center;">Check Console (Press f12)</h4>
    <script>
      //stack rule is last-in first-out
      class Stack {
        constructor() {
          this.items = [];
        }
        push(number) {
          this.items.push(number);
        }
        pop() {
          if (this.items.length === 0) return "Oops, the stack is empty!";
          return this.items.pop();
        }

        // See what the top number is
        peek() {
          return this.items[this.items.length - 1];
        }

        isEmpty() {
          return this.items.length === 0;
        }

        size() {
          return this.items.length;
        }
      }

      // Using the stack
      let myStack = new Stack();
      myStack.push(5);
      myStack.push(10);
      console.log(myStack.peek()); // Output: 10
      myStack.pop();
      console.log(myStack.peek()); // Output: 5
    </script>
  </body>
</html>

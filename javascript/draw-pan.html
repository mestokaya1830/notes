<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .material-symbols-outlined {
        font-variation-settings: 
        "FILL" 0, 
        "wght" 400, 
        "GRAD" 0, 
        "opsz" 24;
        margin-right: 5px;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        padding: 30px 50px;
        background-color: cadetblue;
      }
      .container {
        display: flex;
        width: 100%;
        height: 100%;
        margin-top: 30px;
      }
      h1 {
        color: #ddd;
      }
      .left {
        display: flex;
        flex-direction: column;
        width: 14%;
        background-color: #fff;
        border-radius: 5px;
        margin-right: 1%;
        padding: 20px;
      }
      .right {
        display: flex;
        flex-direction: column;
        width: 85%;
        background-color: #fff;
        border-radius: 5px;
      }
      .left-titles {
        font-size: 20px;
        font-weight: 500;
        color: #333;
      }
      .shapes-con {
        list-style: none;
        margin-top: 10px;
      }
      .shapes-con li {
        display: flex;
        align-items: center;
        height: 34px;
        color: #666;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 5px;
        padding: 0 10px;
      }
      .range {
        margin: 20px 0;
      }
      .radio-con {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 40px;
        margin-top: 20px;
      }
      .radio-con input {
        visibility: hidden;
      }
      .radio-con label {
        display: block;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1px solid #ccc;
        cursor: pointer;
        outline: 1px solid #444;
      }
      .radio-con label:hover {
        transform: scale(1.07);
      }
      .radio-con #white {
        background-color: white;
      }
      .radio-con #black {
        background-color: black;
      }
      .radio-con #blue {
        background-color: blue;
      }
      .radio-con #green {
        background-color: green;
      }
      .radio-con #red {
        background-color: red;
      }
      .clear-btn,
      .save-btn {
        padding: 10px 0;
        width: 100%;
        margin-top: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 18px;
        color: #444;
        cursor: pointer;
      }
      .save-btn {
        background-color: darkcyan;
        color: #fff;
      }
      .clear-btn:hover,
      .save-btn:hover {
        transform: scale(1.05);
      }
      .shapes-con li:hover{
        background-color: #f1f1f1;
        border: 1px solid #ddd;
      }
      .fill-color{
        border: 1px solid #ddd;
      }

      
    </style>
  </head>
  <body>
    <h1>Javascript Draw Pan</h1>
    <div class="container">
      <div class="left">
        <label class="left-titles">Shapes</label>
        <ul class="shapes-con">
          <li><span class="material-symbols-outlined">check_box_outline_blank</span>Rectangle</li>
          <li><span class="material-symbols-outlined">circle</span>Circle</li>
          <li><span class="material-symbols-outlined">change_history</span>Triangle</li>
          <li><span class="material-symbols-outlined fill-color">check_box_outline_blank</span>Fill Color</li>
        </ul>
        <label class="left-titles">Options</label>
        <ul class="shapes-con">
          <li><span class="material-symbols-outlined">brush</span>Brush</li>
          <li><span class="material-symbols-outlined">ink_eraser</span>Eraser</li>
        </ul>
        <input type="range" class="range" id="range" />
        <label class="left-titles">Colors</label>
        <div class="radio-con">
          <label for="white" id="white"
            ><input type="radio" class="radio-inputs" id="white"
          /></label>
          <label for="white" id="black"
            ><input type="radio" class="radio-inputs" id="black"
          /></label>
          <label for="white" id="blue"
            ><input type="radio" class="radio-inputs" id="blue"
          /></label>
          <label for="white" id="green"
            ><input type="radio" class="radio-inputs" id="green"
          /></label>
          <label for="white" id="red"
            ><input type="radio" class="radio-inputs" id="red"
          /></label>
        </div>
        <button class="clear-btn">Clear Canvas</button>
        <button class="save-btn">Save</button>
      </div>
      <div class="right"></div>
    </div>
  </body>
</html>

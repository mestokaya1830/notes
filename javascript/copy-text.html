<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copy Text</title>
</head>

<body>
  <h2 style="margin-top:20px;text-align: center;">Copy String</h2>
  <h4 style="margin:5px;text-align: center;">Paste anywhere</h4>

  <div
    style="display: flex;flex-direction: column;justify-content: space-between;  height:70px;width:400px;margin: 20px auto;">
    <input type="text" name="" id="text" placeholder="Enter text..." style="height: 30px;padding-left: 5px;">
    <button id="copyText" style="height: 30px;">Copy Input Value</button>
  </div>
  <script>
    document.getElementById('copyText').addEventListener('click', () => {
      const textarea = document.createElement('textarea')
      const txt = document.getElementById('text').value
      if (!txt) { return }
      textarea.value = txt
      document.body.appendChild(textarea)
      textarea.select()
      document.execCommand('copy')
      textarea.remove()
      alert('Password copied to clipboard!')
    })
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      .container{
       display: flex;
       width: 100%;
       height: 100px;
       background-color: #ddd;
       gap: 10px;
       & div {
        flex: 1;
        border: 1px solid #ccc;
        background-color: #fff;
       }
      }
    </style>
  </head>
  <body>
    <div class="container">
     <div></div>
     <div></div>
     <div></div>
     <div></div>
     <div></div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      
    }
    .book{
      position: relative;
      top: 0;
      width: 400px;
      height: 600px;
      background-color: cadetblue;
      border-radius: 5px;
      transform: rotate(-37.5deg) skewX(10deg);
      box-shadow: -35px 35px 50px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="book"></div>
</body>
</html>

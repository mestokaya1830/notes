<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  html{
    scroll-behavior: smooth;
  }
  .container{
    display: flex;
    /* width: 400px; */
    /* width: min(60%, 200px); */
    height: 200px;
    border: 1px solid #ccc;
    border-radius: 5px;
    margin: 50px auto;
    inset: 10px;
    padding-block: 20px;
    width: max(60%, 200px);
  }
  .items{
    display: flex;
    align-items: center;
    justify-content: center;
    width:100%;
    height: 100%;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 50px;
    margin-inline: 10px;
  }
  </style>
</head>
<body>
  <div class="container">
    <div class="items">1</div>
  </div>
</body>
</html>

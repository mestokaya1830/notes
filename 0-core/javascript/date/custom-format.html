<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Format</title>
</head>

<body>
  <h2 style="margin: 10px; text-align: center;">Custom Format</h2>
  <p style="margin: 10px; text-align: center;">Look at the Concole</p>
  <script>
    const dateFormat = (selected, day=0, month=0, year=0, hour=0, minute=0, sec=0) => {
      let cd = new Date()
      const y = cd.getFullYear() + year
      let m = cd.getMonth() + 1 + month
      const dw = cd.getDay()
      let d = cd.getDate() + day
      let h = cd.getHours() + hour
      let min = cd.getMinutes() + minute
      let s = cd.getSeconds() + sec

      h > 9 ? h : h = '0' + h
      m > 9 ? m : m = '0' + m
      s > 9 ? s : s = '0' + s
      d > 9 ? d : d = '0' + d

      const times = {
        d: d,
        m: m,
        y: y,
        dm: `${d}/${m}`,
        md: `${m}/${d}`,
        my: `${m}/${y}`,
        ym: `${y}/${m}`,
        ymd: `${y}/${m}/${d}`,
        ydm: `${y}/${d}/${m}`,
        dmy: `${d}/${m}/${y}`,
        mdy: `${m}/${d}/${y}`,
        h: h,
        min: min,
        hmins: `${h}:${min}:${s}`,
        hmin: `${h}:${min}`,
        mins: `${min}:${s}`,
        dw: dw,
        ymdhmin: `${y}/${m}/${d} ${h}:${min}`,
        ld: cd.toLocaleDateString(),
        lt: cd.toLocaleTimeString(),
        ls: cd.toLocaleString(),
        f1: `${y}/${m}/${d} ${h}:${min}:${s}`,
        f2: `${d}/${m}/${y} ${h}:${min}:${s}`,
        f3: `${m}/${d}/${y} ${h}:${min}:${s}`
      }
      return times[selected]
    }
    console.log(dateFormat('dmy'))
    console.log(dateFormat('ld'))
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Array</title>
</head>
<body>
  <h2 style="margin-top:20px;text-align: center;">Create Array</h2>
  <h4 style="margin:5px;text-align: center;">Check Console (Press f12)</h4>
  <script>
    //array from
    let array_from = Array.from({ length: 30 }, (a, b) => b + 1)
    console.log(array_from)

    //generate with array and sort
    let array_with_sort = Array.from({ length: 30 }, (a, b) => b + 1).sort((x, y) => y - x)
    console.log(array_with_sort)
  </script>
</body>
</html>

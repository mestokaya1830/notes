<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let num = 5;

      //break displayed until 3
      for (let i = 0; i < num; i++) {
        if (i === 3) {
          break;
        }
        console.log(i);
      }

      console.log('--------------------------------------------')
      //continuou (3 is not displayed)
      for (let i = 0; i < num; i++) {
        if (i === 3) {
          continue;
        }
        console.log(i);
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array-Filter</title>
</head>
<body>
  <h2 style="margin-top:20px;text-align: center;">Array-Filter</h2>
  <h4 style="margin:5px;text-align: center;">Check Console(Press f12)</h4>

  <script>
    //basic literal
    let lang = ['Html','Css','Javascript','Nodejs','Mongodb','Mysql']

    //get all items
    console.log(lang)

    //loop item
    console.log('-----------------Loop Items')
    for (const item of lang) {
      console.log(item)
    }

    //loop item with indexes
    console.log('-----------------Loop Items With Indexes')
    
    lang.forEach((item, index) => {
      console.log(`'Index: ${index} ${item}`)
    })

    //loop item in range with loop step 2
    console.log('-----------------Loop Items In Range')
    for (let i = 0; i < lang.length-1; i+= 2) {
      console.log(`Index ${i} ${lang[i]}`)
    }

  </script>
</body>
</html>
